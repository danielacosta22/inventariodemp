<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Inventario</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<style>
body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
.container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
.grid { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
.card { flex: 1; min-width: 320px; padding: 15px; border: 1px solid #ddd; background: #fafafa; border-radius: 5px; }
label { display: block; margin-top: 10px; font-weight: bold; font-size: 14px; color: #333; }
input, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;}
button { margin-top: 15px; padding: 10px; width: 100%; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold;}
button.salida { background: #dc3545; }
.btn-secundario { background: #34495e; width: auto; margin-bottom: 10px; }
.btn-exportar { background: #8e44ad; width: auto; margin-bottom: 10px; }
.buscador-input { display: inline-block; width: 250px; margin-right: 10px; margin-bottom: 10px; border: 2px solid #3498db; }
.badge-contador { font-size: 14px; background: #3498db; color: white; padding: 4px 10px; border-radius: 12px; vertical-align: middle; margin-left: 10px; font-weight: normal; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
th { background-color: #2c3e50; color: white; }
.alerta { color: #dc3545; font-weight: bold; }
.dinero { color: #27ae60; font-weight: bold; }
.header-acciones { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; flex-wrap: wrap; gap: 10px;}
.btn-eliminar { background: #e74c3c; padding: 6px 10px; margin: 0; width: auto; font-size: 16px; border-radius: 4px; }
.flex-input { display: flex; gap: 5px; align-items: center; margin-top: 5px; }
.btn-scan { background: #2980b9; margin: 0; width: auto; padding: 8px 12px; font-size: 16px; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div class="container">
<h1>Gestión de Inventario: Comunicaciones y Control</h1>
<div class="grid">
<div class="card">
<h2 style="color: #2980b9;">1. Alta de Nuevo Componente</h2>

<label>SKU (Código / Código de Barras):</label> 
<div class="flex-input">
    <input type="text" id="sku" placeholder="Ej. MOD-RF-NRF24 / SEN-IR-001" style="margin: 0;">
    <button class="btn-scan" onclick="abrirEscaner('sku')" title="Escanear Código">📷</button>
</div>

<label>Nombre y Descripción:</label> <input type="text" id="nombre" placeholder="Ej. Módulo Transceptor NRF24 / PLC S7-1200">
<label>Unidad:</label> <input type="text" id="unidad" placeholder="Ej. Pzas / Metros">
<div style="display: flex; gap: 10px;">
<div style="flex: 1;"><label>Stock Mínimo:</label> <input type="number" id="minimo" value="2"></div>
<div style="flex: 1;"><label>Costo Unitario ($):</label> <input type="number" id="costo" placeholder="0.00"></div>
</div>
<button onclick="guardarProducto()">Registrar en Catálogo</button>
</div>

<div class="card">
<h2 style="color: #27ae60;">2. Registro de Movimientos</h2>
<label>Responsable del movimiento:</label> <input type="text" id="responsable" placeholder="Tu nombre">

<label>Código del Componente (SKU):</label> 
<div class="flex-input">
    <input type="text" id="sku_movimiento" list="lista_productos" placeholder="Escanea o escribe el código..." style="margin: 0;" autocomplete="off">
    <datalist id="lista_productos"></datalist>
    <button class="btn-scan" onclick="abrirEscaner('movimiento')" title="Escanear Código">📷</button>
</div>

<label>Cantidad:</label> <input type="number" id="cantidad" value="1">
<label>Motivo o Folio:</label> <input type="text" id="motivo" placeholder="Ej. Uso en proyectos / Taller">
<div style="display: flex; gap: 10px;">
<button onclick="hacerMovimiento('Entrada')">Ingresar a Almacén</button>
<button class="salida" onclick="hacerMovimiento('Salida')">Dar Salida</button>
</div>
</div>
</div>

<div class="header-acciones">
<h2 style="margin: 0;">Kardex y Valoración <span id="contador-productos" class="badge-contador">0 registrados</span></h2>
<div>
<input type="text" id="buscador" class="buscador-input" placeholder="🔍 Buscar por código o nombre..." onkeyup="filtrarTabla()">
<button class="btn-secundario" onclick="cargarTabla()">↻ Actualizar Inventario</button>
<button class="btn-exportar" id="btnExportar" onclick="descargarReporte()">📥 Descargar Historial (Excel)</button>
</div>
</div>
<table>
<thead>
<tr>
<th>SKU</th><th>Descripción</th><th>Stock Actual</th><th>Unidad</th><th>Costo Unit.</th><th>Valor Acumulado</th><th>Estado</th><th>Acción</th>
</tr>
</thead>
<tbody id="tabla-body"><tr><td colspan="8">Cargando datos...</td></tr></tbody>
</table>
</div>

<script>
// =======================================================
// PEGA AQUÍ LA URL DE TU APLICACIÓN WEB DE APPS SCRIPT
const API_URL = "https://script.google.com/macros/s/AKfycbxKNDhnZV1zjsvpcsCIZY67y8zNMurTBZznK-pkwwEbtqikHIDFZW-d2ixXlzGnCwgd/exec

"; 
// =======================================================

let html5QrCode = null; 
window.inventarioGlobal = []; 

async function cargarTabla() {
    document.getElementById('tabla-body').innerHTML = '<tr><td colspan="8">Calculando existencias...</td></tr>';
    try {
        let response = await fetch(API_URL + "?action=obtenerInventario");
        let datos = await response.json();
        mostrarDatos(datos);
    } catch (error) {
        Swal.fire('Error de conexión', 'No se pudo conectar con la base de datos.', 'error');
    }
}

function mostrarDatos(datos) {
    window.inventarioGlobal = datos; 
    let tbody = ''; let opcionesDatalist = '';
    document.getElementById('contador-productos').innerText = datos.length + (datos.length === 1 ? " registrado" : " registrados");

    datos.forEach(p => {
        let estado = p.stock_actual <= p.stock_minimo ? '<span class="alerta">¡Solicitar compra!</span>' : 'Óptimo';
        let formatoCosto = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(p.costo);
        let formatoTotal = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(p.valor_total);

        tbody += `<tr>
        <td>${p.sku}</td><td>${p.nombre}</td>
        <td style="font-size: 16px;"><b>${p.stock_actual}</b></td><td>${p.unidad}</td>
        <td>${formatoCosto}</td><td class="dinero">${formatoTotal}</td><td>${estado}</td>
        <td style="text-align: center;"><button class="btn-eliminar" onclick="eliminarProducto(${p.id})" title="Eliminar">🗑️</button></td>
        </tr>`;
        opcionesDatalist += `<option value="${p.sku}">${p.nombre} (Disp: ${p.stock_actual})</option>`;
    });

    document.getElementById('tabla-body').innerHTML = tbody || '<tr><td colspan="8">Base de datos vacía. Registra tu primer componente.</td></tr>';
    document.getElementById('lista_productos').innerHTML = opcionesDatalist;
}

// LÓGICA DE ESCÁNER (CÁMARA LIBRE DE RESTRICCIONES)
function abrirEscaner(destino) {
    Swal.fire({
        title: '📸 Iniciando Lector...',
        html: '<div id="lector-camara" style="width: 100%; min-height: 250px;">Conectando...</div>',
        showCancelButton: true, showConfirmButton: false, cancelButtonText: 'Cerrar Cámara', cancelButtonColor: '#d33',
        didOpen: () => {
            html5QrCode = new Html5Qrcode("lector-camara");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            const exitoEscaneo = (textoEscaneado) => {
                html5QrCode.stop().then(() => { Swal.close(); procesarEscaneo(textoEscaneado, destino); }).catch(err => {});
            };

            Html5Qrcode.getCameras().then(devices => {
                if (devices && devices.length > 0) {
                    let camaraElegida = devices[0].id;
                    for(let i=0; i < devices.length; i++){
                        if(devices[i].label.toLowerCase().includes("back") || devices[i].label.toLowerCase().includes("trasera") || devices[i].label.toLowerCase().includes("0")){
                            camaraElegida = devices[i].id; break;
                        }
                    }
                    html5QrCode.start(camaraElegida, config, exitoEscaneo, () => {}).catch(err => Swal.fire('Error', 'Fallo al iniciar el lente.', 'error'));
                } else { Swal.fire('Error', 'No se detectó cámara.', 'error'); }
            }).catch(err => Swal.fire('Permisos Bloqueados', 'Activa los permisos de la cámara en el navegador.', 'error'));
        },
        willClose: () => { if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop().catch(err => console.log(err)); }
    });
}

function procesarEscaneo(codigo, destino) {
    codigo = codigo.trim(); 
    if (destino === 'sku') {
        document.getElementById('sku').value = codigo;
        Swal.fire({ title: '¡Listo!', text: 'Código: ' + codigo, icon: 'success', timer: 1000, showConfirmButton: false });
    } else if (destino === 'movimiento') {
        document.getElementById('sku_movimiento').value = codigo;
        Swal.fire({ title: '¡Escaneado!', text: 'Código: ' + codigo, icon: 'success', timer: 1000, showConfirmButton: false });
    }
}

// LLAMADAS AL SERVIDOR (POST)
async function ejecutarBackend(datos) {
    try {
        let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(datos) });
        return await res.json();
    } catch (e) {
        return { success: false, message: "Error de red. Verifica tu conexión." };
    }
}

async function guardarProducto() {
    const { value: clave } = await Swal.fire({ title: '🔐 Acción Protegida', input: 'password', showCancelButton: true, confirmButtonColor: '#28a745' });
    if (!clave) return;

    const form = {
        sku: document.getElementById('sku').value, nombre: document.getElementById('nombre').value,
        unidad: document.getElementById('unidad').value, minimo: document.getElementById('minimo').value,
        costo: document.getElementById('costo').value
    };

    let respuesta = await ejecutarBackend({ action: 'registrarProducto', formulario: form, clave: clave });
    if(respuesta.success) {
        Swal.fire('¡Éxito!', respuesta.message, 'success'); cargarTabla(); 
        document.getElementById('sku').value = ''; document.getElementById('nombre').value = '';
        document.getElementById('unidad').value = ''; document.getElementById('minimo').value = '2'; document.getElementById('costo').value = '';
    } else { Swal.fire('Error', respuesta.message, 'error'); }
}

async function hacerMovimiento(tipo) {
    let clave = null;
    if (tipo === 'Entrada') {
        const { value: inputClave } = await Swal.fire({ title: '🔐 Acción Protegida', input: 'password', showCancelButton: true, confirmButtonColor: '#28a745' });
        if (!inputClave) return;
        clave = inputClave;
    }

    const skuIngresado = document.getElementById('sku_movimiento').value.trim();
    const responsableIngresado = document.getElementById('responsable').value.trim();

    if(!responsableIngresado) { Swal.fire('Atención', 'Ingresa tu nombre.', 'warning'); return; }
    if(!skuIngresado) { Swal.fire('Atención', 'Escanea el componente.', 'warning'); return; }

    const productoEncontrado = window.inventarioGlobal.find(p => p.sku === skuIngresado);
    if (!productoEncontrado) { Swal.fire('Error', `Código "${skuIngresado}" no existe.`, 'error'); return; }

    const form = { responsable: responsableIngresado, id_producto: productoEncontrado.id, cantidad: document.getElementById('cantidad').value, motivo: document.getElementById('motivo').value };

    let respuesta = await ejecutarBackend({ action: 'registrarMovimiento', tipo: tipo, formulario: form, clave: clave });
    if(respuesta.success) {
        Swal.fire('¡Registrado!', respuesta.message, 'success'); cargarTabla(); 
        document.getElementById('sku_movimiento').value = ''; document.getElementById('cantidad').value = '1'; document.getElementById('motivo').value = '';
    } else { Swal.fire('Error Operativo', respuesta.message, 'error'); }
}

async function eliminarProducto(id_producto) {
    const result = await Swal.fire({ title: '⚠️ ¿Estás seguro?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'Sí, eliminar' });
    if (!result.isConfirmed) return;

    const { value: clave } = await Swal.fire({ title: '🔐 Autorización', input: 'password', showCancelButton: true, confirmButtonColor: '#d33' });
    if (!clave) return;

    let respuesta = await ejecutarBackend({ action: 'eliminarProducto', id_producto: id_producto, clave: clave });
    if(respuesta.success) { Swal.fire('Eliminado', respuesta.message, 'success'); cargarTabla(); } 
    else { Swal.fire('Error', respuesta.message, 'error'); }
}

async function descargarReporte() {
    const btn = document.getElementById('btnExportar'); btn.innerText = "⏳ Generando..."; btn.disabled = true;
    try {
        let res = await fetch(API_URL + "?action=obtenerHistorial");
        let datos = await res.json();
        let csvContent = "\uFEFF"; 
        datos.forEach(fila => { csvContent += fila.map(celda => `"${String(celda).replace(/"/g, '""')}"`).join(",") + "\r\n"; });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
        link.setAttribute("download", `Historial_Movimientos_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    } catch (e) { Swal.fire('Error', 'No se pudo descargar el archivo.', 'error'); }
    btn.innerText = "📥 Descargar Historial (Excel)"; btn.disabled = false;
}

function filtrarTabla() {
    let input = document.getElementById("buscador");
    let filter = input.value.toLowerCase();
    let tr = document.getElementById("tabla-body").getElementsByTagName("tr");
    for (let i = 0; i < tr.length; i++) {
        if (tr[i].getElementsByTagName("td").length > 1) {
            let tdSKU = tr[i].getElementsByTagName("td")[0]; let tdNombre = tr[i].getElementsByTagName("td")[1];
            if (tdSKU || tdNombre) {
                let txtValue = (tdSKU.textContent || tdSKU.innerText) + " " + (tdNombre.textContent || tdNombre.innerText);
                tr[i].style.display = txtValue.toLowerCase().indexOf(filter) > -1 ? "" : "none";
            }
        }
    }
}

window.onload = cargarTabla;
</script>
</body>
</html>
